<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Talentera Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script> </head>
<body class="bg-gray-100 p-8">
    <div class="max-w-6xl mx-auto">
        <header class="mb-8 text-center">
            <h1 class="text-3xl font-bold text-blue-900">Talentera Daily Huddle</h1>
            <p id="last-update" class="text-gray-500"></p>
        </header>

        <div id="stats-grid" class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8"></div>

        <div id="ai-insights" class="bg-white p-6 rounded-xl shadow-md border-l-4 border-purple-500 mb-8">
            <h2 class="font-bold text-lg mb-4">AI Coaching Insights 🤖</h2>
            <div id="insights-content" class="space-y-2 text-sm text-gray-700"></div>
        </div>
    </div>

    <script>
        async function loadDashboard() {
            const response = await fetch('./data.json');
            const data = await response.json();
            
            document.getElementById('last-update').innerText = `Generated At: ${data.generatedAt}`;
            
            // هنا تضع الكود البسيط الذي يوزع بيانات الـ Summary والـ Insights في الصفحة
            // سيعمل هذا تلقائياً مع كل تحديث يرسله n8n
        }
        loadDashboard();
    </script>
</body>
</html>
